# Scheduled polling has moved to a DigitalOcean droplet (see DEPLOY.md) for
# seconds-level notification latency, which GitHub Actions cron (1-minute
# floor, often several minutes late in practice) can't provide. This workflow
# is kept as a manual one-off backup check only, so it doesn't run
# concurrently with the droplet and cause duplicate notifications.
name: CROUS watcher (manual backup)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          SEARCH_URL: ${{ secrets.SEARCH_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_ONCE: "true"
        run: python bot.py

      - name: Save state
        run: |
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "update state"
            git push
          fi
